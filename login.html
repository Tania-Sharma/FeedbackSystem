<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College Feedback System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container { width: 100%; max-width: 900px; }
        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        .header i { font-size: 3rem; margin-bottom: 15px; }
        .login-options { display: flex; padding: 30px; gap: 20px; }
        .login-option {
            flex: 1;
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            color: white;
        }
        .login-option:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        .student-option { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .teacher-option { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .admin-option { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .login-option i { font-size: 3rem; margin-bottom: 15px; }
        .login-option h3 { font-size: 1.3rem; margin-bottom: 10px; }
        .modal-header { border: none; }
        .modal-student .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .modal-teacher .modal-header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .modal-admin .modal-header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 2px solid #e0e0e0; }
        .btn-student { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 10px; color: white; }
        .btn-teacher { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); border: none; border-radius: 10px; color: white; }
        .btn-admin { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border: none; border-radius: 10px; color: white; }
        @media (max-width: 768px) { .login-options { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="main-card">
            <div class="header">
                <i class="fas fa-graduation-cap"></i>
                <h1>College Feedback System</h1>
                <p>Select your role to login</p>
            </div>
            
            <div class="login-options">
                <div class="login-option student-option" data-bs-toggle="modal" data-bs-target="#studentLoginModal">
                    <i class="fas fa-user-graduate"></i>
                    <h3>Student Login</h3>
                    <p>Submit your feedback</p>
                </div>
                
                <div class="login-option teacher-option" data-bs-toggle="modal" data-bs-target="#teacherLoginModal">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <h3>Teacher Login</h3>
                    <p>View your feedback</p>
                </div>
                
                <div class="login-option admin-option" data-bs-toggle="modal" data-bs-target="#adminLoginModal">
                    <i class="fas fa-user-cog"></i>
                    <h3>Admin Login</h3>
                    <p>Manage system</p>
                </div>
            </div>
            
            <div class="text-center pb-4">
                <a href="/forgot_password" class="text-decoration-none" style="color: #667eea;">Forgot Password?</a>
            </div>
        </div>
    </div>
    
    <!-- Student Login Modal -->
    <div class="modal fade student-modal" id="studentLoginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-user-graduate me-2"></i>Student Login</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form method="POST" action="/login">
                    <div class="modal-body">
                        <input type="hidden" name="role" value="student">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-student">Login as Student</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Teacher Login Modal -->
    <div class="modal fade teacher-modal" id="teacherLoginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-chalkboard-teacher me-2"></i>Teacher Login</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form method="POST" action="/login">
                    <div class="modal-body">
                        <input type="hidden" name="role" value="teacher">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-teacher">Login as Teacher</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Admin Login Modal -->
    <div class="modal fade admin-modal" id="adminLoginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-user-cog me-2"></i>Admin Login</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form method="POST" action="/login">
                    <div class="modal-body">
                        <input type="hidden" name="role" value="admin">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter admin username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-admin">Login as Admin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
